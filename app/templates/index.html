<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Clone Detection</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>AI-Based Voice Clone Detection</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="audio" accept=".wav" required><br><br>
        <button type="submit">Detect Voice</button>
    </form>

    {% if result %}
        <h3>Result: {{ result }}</h3>
        <p>Confidence: {{ confidence }}</p>
    {% endif %}
</div>

</body>
</html>
