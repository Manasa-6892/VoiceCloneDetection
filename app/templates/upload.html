{% extends "base.html" %}

{% block title %}Upload Audio - Voice Clone Detection{% endblock %}

{% block content %}
  <div class="card">
    <h2>Upload Audio for Detection</h2>
    <p class="text-muted">
      Supported format: .wav. The system will analyze the audio and classify it as Human or Cloned voice.
    </p>
    <form method="POST" action="{{ url_for('detect') }}" enctype="multipart/form-data">
      <input type="file" name="audio" accept=".wav" required><br><br>
      <button type="submit">Detect Voice</button>
    </form>
  </div>
{% endblock %}
