<!DOCTYPE html>
<html>
<head>
  <title>Login - Voice Clone Detection</title>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .auth-card {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      width: 320px;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 8px 0;
      border-radius: 4px;
      border: none;
      background-color: #2563eb;
      color: #ffffff;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    .footer {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
    }
    .footer a {
      color: #2563eb;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .errors {
      margin-top: 8px;
      color: #b91c1c;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <h2>Login</h2>
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button type="submit">Login</button>
    </form>
    <div class="footer">
      No account? <a href="{{ url_for('signup') }}">Sign up</a>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="errors">
          {% for m in messages %}
            <div>{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>
</body>
</html>
